<P><A NAME="VolumeBoolean-Remote"></A><h2>VolumeBoolean - Remote</h2></P>
Select the volume if it is Remote(yes) or not Remote(no). A remote disk
  is usually a network disk.<p><h3>Syntax</h3><center><table bgcolor="#EEEEEE" width="80%"><tr><td><code>Remote(yes)<br>Remote(no)</code></td></tr></table></center><p><p><h3>Example</h3><center><table bgcolor="#EEEEEE" width="80%"><tr><td><code>VolumeSelect<br />
&nbsp;&nbsp;Remote(yes)<br />
VolumeActions<br />
&nbsp;&nbsp;...<br />
VolumeEnd</code></td></tr></table></center><p><p><h3>See also:</h3><a href="Scripts-VolumeSelect.html"><img src="img/Bullit.gif" width=14 height=14 align=absmiddle border=0 alt=" * ">&nbsp;<b>VolumeSelect</b></a><br><a href="Scripts-VolumeBoolean.html"><img src="img/Bullit.gif" width=14 height=14 align=absmiddle border=0 alt=" * ">&nbsp;<b>VolumeBoolean</b></a><br><a href="Scripts-VolumeActions.html"><img src="img/Bullit.gif" width=14 height=14 align=absmiddle border=0 alt=" * ">&nbsp;<b>VolumeActions</b></a><br>
