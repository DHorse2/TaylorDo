<P><A NAME="VolumeBoolean-Fixed"></A><h2>VolumeBoolean - Fixed</h2></P>
Select the volume if it has Fixed(yes) or not Fixed(no) media, for example,
  a hard drive or flash drive.<p><h3>Syntax</h3><center><table bgcolor="#EEEEEE" width="80%"><tr><td><code>Fixed(yes)<br>Fixed(no)</code></td></tr></table></center><p><p><h3>Example</h3><center><table bgcolor="#EEEEEE" width="80%"><tr><td><code>VolumeSelect<br />
&nbsp;&nbsp;Fixed(yes)<br />
VolumeActions<br />
&nbsp;&nbsp;...<br />
VolumeEnd</code></td></tr></table></center><p><p><h3>See also:</h3><a href="VolumeBoolean-Removable.html"><img src="img/Bullit.gif" width=14 height=14 align=absmiddle border=0 alt=" * ">&nbsp;<b>Removable</b></a><br><a href="Scripts-VolumeSelect.html"><img src="img/Bullit.gif" width=14 height=14 align=absmiddle border=0 alt=" * ">&nbsp;<b>VolumeSelect</b></a><br><a href="Scripts-VolumeBoolean.html"><img src="img/Bullit.gif" width=14 height=14 align=absmiddle border=0 alt=" * ">&nbsp;<b>VolumeBoolean</b></a><br><a href="Scripts-VolumeActions.html"><img src="img/Bullit.gif" width=14 height=14 align=absmiddle border=0 alt=" * ">&nbsp;<b>VolumeActions</b></a><br>
